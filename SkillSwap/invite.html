<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>邀請好友 — 技遇</title>
<meta name="theme-color" content="#3D9970"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="manifest" href="manifest.json"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--g:#3D9970;--gl:#E8F5EF;--gd:#2D7A55;--t:#111;--t2:#888;--bd:#EBEBEB;--bg2:#F7F7F7;}
html,body{min-height:100%;background:#fff;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;}
#app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}
.hdr{padding:calc(env(safe-area-inset-top,0px)+14px) 20px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd);}
.back-btn{background:none;border:none;font-size:22px;color:var(--t2);cursor:pointer;}
.hdr-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--t);}
.hdr-title i{font-style:italic;color:var(--g);}
.content{padding:24px 22px;flex:1;}

/* 獎勵卡 */
.reward-card{background:var(--g);border-radius:20px;padding:22px;margin-bottom:22px;text-align:center;}
.reward-em{font-size:48px;margin-bottom:10px;}
.reward-title{font-family:'Instrument Serif',serif;font-size:22px;color:#fff;margin-bottom:6px;}
.reward-sub{font-size:14px;color:rgba(255,255,255,.8);line-height:1.6;}
.reward-badges{display:flex;justify-content:center;gap:10px;margin-top:16px;}
.reward-badge{background:rgba(255,255,255,.2);border-radius:100px;padding:6px 16px;font-size:13px;color:#fff;font-weight:500;}

/* 連結區 */
.link-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:16px;}
.link-label{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.link-row{display:flex;align-items:center;gap:10px;}
.link-text{flex:1;font-size:14px;color:var(--t);background:#fff;border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.copy-btn{padding:10px 16px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;}

/* 分享按鈕 */
.share-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.s-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;border:none;background:none;font-family:inherit;}
.s-icon{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.s-label{font-size:11px;color:var(--t2);font-weight:500;}

/* 進度 */
.progress-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:16px;}
.prog-title{font-size:13px;font-weight:600;color:var(--t);margin-bottom:12px;}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.prog-label{font-size:13px;color:var(--t2);}
.prog-value{font-size:13px;font-weight:600;color:var(--g);}
.prog-bar-wrap{height:6px;background:var(--bd);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.prog-bar-fill{height:100%;background:var(--g);border-radius:3px;transition:width .6s ease;}
.prog-next{font-size:12px;color:var(--t2);text-align:center;padding-top:4px;}

/* 好友列表 */
.friend-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);}
.friend-item:last-child{border:none;}
.friend-ava{width:38px;height:38px;border-radius:12px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:18px;}
.friend-name{font-size:14px;font-weight:500;color:var(--t);flex:1;}
.friend-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px;}
.friend-joined{background:var(--gl);color:var(--gd);}
.friend-pending{background:var(--bg2);color:var(--t2);}

/* 規則 */
.rules-card{background:var(--bg2);border-radius:14px;padding:16px;}
.rule-item{display:flex;gap:10px;margin-bottom:10px;}
.rule-item:last-child{margin-bottom:0;}
.rule-num{width:22px;height:22px;border-radius:50%;background:var(--g);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.rule-text{font-size:13px;color:var(--t2);line-height:1.55;}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+20px);left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;padding:10px 20px;border-radius:100px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div class="hdr-title">邀請<i>好友</i></div>
  </div>
  <div class="content">

    <!-- 獎勵說明 -->
    <div class="reward-card">
      <div class="reward-em">🎁</div>
      <div class="reward-title">邀請好友，雙方都獲益</div>
      <div class="reward-sub">每成功邀請一位好友加入技遇，<br>你和好友各獲得 <strong>7 天免費 Premium</strong></div>
      <div class="reward-badges">
        <div class="reward-badge">你 +7天 Premium</div>
        <div class="reward-badge">好友 +7天 Premium</div>
      </div>
    </div>

    <!-- 邀請連結 -->
    <div class="link-label">你的專屬邀請連結</div>
    <div class="link-card">
      <div class="link-row">
        <div class="link-text" id="invite-link">載入中…</div>
        <button class="copy-btn" onclick="copyInvite()">複製</button>
      </div>
    </div>

    <!-- 分享按鈕 -->
    <div class="share-row">
      <button class="s-btn" onclick="shareInvite('line')">
        <div class="s-icon" style="background:#00B900;"><svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg></div>
        <span class="s-label">LINE</span>
      </button>
      <button class="s-btn" onclick="shareInvite('facebook')">
        <div class="s-icon" style="background:#1877F2;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
        <span class="s-label">Facebook</span>
      </button>
      <button class="s-btn" onclick="shareInvite('instagram')">
        <div class="s-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg></div>
        <span class="s-label">Instagram</span>
      </button>
      <button class="s-btn" onclick="shareInvite('native')">
        <div class="s-icon" style="background:var(--gl);">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#3D9970" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </div>
        <span class="s-label">更多</span>
      </button>
    </div>

    <!-- 邀請進度 -->
    <div class="progress-card">
      <div class="prog-title">你的邀請進度</div>
      <div class="prog-row">
        <span class="prog-label">已成功邀請</span>
        <span class="prog-value" id="invited-count">0 人</span>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-next" id="prog-next">再邀請 3 人獲得「邀請達人」徽章</div>
      <div id="friends-list" style="margin-top:12px;">
        <div style="text-align:center;padding:12px;font-size:13px;color:var(--t2);">還沒有成功邀請的好友</div>
      </div>
    </div>

    <!-- 規則說明 -->
    <div class="link-label" style="margin-bottom:10px;">活動規則</div>
    <div class="rules-card">
      <div class="rule-item"><div class="rule-num">1</div><div class="rule-text">分享你的專屬連結給好友</div></div>
      <div class="rule-item"><div class="rule-num">2</div><div class="rule-text">好友點擊連結並完成註冊</div></div>
      <div class="rule-item"><div class="rule-num">3</div><div class="rule-text">好友完成第一次技能交換申請</div></div>
      <div class="rule-item"><div class="rule-num">4</div><div class="rule-text">雙方各獲得 7 天 Premium，自動加入帳號</div></div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://your-project.supabase.co';
const SUPABASE_KEY = 'your-anon-public-key';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let inviteCode = '';

window.addEventListener('DOMContentLoaded', async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }

  // 用 user id 前 8 碼當邀請碼
  inviteCode = user.id.replace(/-/g,'').slice(0,8).toUpperCase();
  const link = `${location.origin}/index.html?ref=${inviteCode}`;
  document.getElementById('invite-link').textContent = link;

  await loadReferrals(user.id);
});

async function loadReferrals(userId) {
  const { data, count } = await sb.from('referrals')
    .select('*,profiles!referrals_referred_id_fkey(full_name,avatar_url)',{ count:'exact' })
    .eq('referrer_id', userId);

  const list = data || [];
  const n = count || 0;
  document.getElementById('invited-count').textContent = n + ' 人';
  const pct = Math.min(100, Math.round(n/3*100));
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-next').textContent = n >= 3
    ? '🏅 已獲得「邀請達人」徽章！'
    : `再邀請 ${3-n} 人獲得「邀請達人」徽章`;

  if (list.length) {
    document.getElementById('friends-list').innerHTML = list.map(r => `
      <div class="friend-item">
        <div class="friend-ava">${r.profiles?.avatar_url||'😊'}</div>
        <div class="friend-name">${r.profiles?.full_name||'好友'}</div>
        <span class="friend-status ${r.status==='completed'?'friend-joined':'friend-pending'}">
          ${r.status==='completed'?'已加入':'邀請中'}
        </span>
      </div>`).join('');
  }
}

function copyInvite() {
  const link = document.getElementById('invite-link').textContent;
  navigator.clipboard?.writeText(link).then(()=>showToast('邀請連結已複製 ✓'));
}

function shareInvite(platform) {
  const link = document.getElementById('invite-link').textContent;
  const url  = encodeURIComponent(link);
  const msg  = encodeURIComponent(`我在技遇上找到好多技能可以交換！用我的邀請連結加入，我們各獲得 7 天免費 Premium 🎁`);
  const map  = {
    line:     `https://social-plugins.line.me/lineit/share?url=${url}&text=${msg}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
    instagram: null,
  };
  if (platform === 'native' || platform === 'instagram') {
    if (navigator.share) {
      navigator.share({ title:'邀請你加入技遇', text: decodeURIComponent(msg), url: link });
    } else {
      copyInvite();
    }
    return;
  }
  if (map[platform]) window.open(map[platform], '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
