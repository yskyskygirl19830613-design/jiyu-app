<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>重設密碼 — 技遇</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#3D9970"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#3D9970;--gl:#E8F5EF;--bd:#EBEBEB;--t:#111;--t2:#888;}
html,body{height:100%;background:#fff;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;}
.wrap{max-width:430px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px)+48px) 28px 32px;}
.logo{font-family:'Instrument Serif',serif;font-size:26px;color:var(--t);margin-bottom:6px;}
.logo i{font-style:italic;color:var(--g);}
.sub{font-size:15px;color:var(--t2);margin-bottom:32px;line-height:1.5;}
.fg{margin-bottom:16px;}
.fl{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:7px;display:block;}
.fi{width:100%;border:1.5px solid var(--bd);border-radius:13px;padding:13px 16px;font-family:inherit;font-size:15px;color:var(--t);outline:none;transition:border .15s;}
.fi:focus{border-color:var(--g);}
.btn{width:100%;padding:15px;border-radius:14px;background:var(--g);color:#fff;font-size:16px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn:disabled{opacity:.45;}
.msg{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none;}
.msg.show{display:block;}
.err{background:#FEE;color:#C0392B;}
.ok{background:var(--gl);color:#2D7A55;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">設定新<i>密碼</i></div>
  <div class="sub">請輸入你的新密碼，至少 8 個字元。</div>
  <div class="msg" id="msg"></div>
  <div class="fg"><label class="fl">新密碼</label><input class="fi" type="password" id="new-pwd" placeholder="至少 8 個字元" autocomplete="new-password"/></div>
  <div class="fg"><label class="fl">確認新密碼</label><input class="fi" type="password" id="confirm-pwd" placeholder="再輸入一次" autocomplete="new-password"/></div>
  <button class="btn" id="update-btn" onclick="updatePassword()">更新密碼</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://your-project.supabase.co';
const SUPABASE_KEY='your-anon-public-key';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function updatePassword(){
  const pwd=document.getElementById('new-pwd').value;
  const confirm=document.getElementById('confirm-pwd').value;
  const btn=document.getElementById('update-btn');
  if(pwd.length<8){setMsg('密碼至少需要 8 個字元','err');return;}
  if(pwd!==confirm){setMsg('兩次密碼不一致','err');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>更新中…';
  const{error}=await sb.auth.updateUser({password:pwd});
  btn.disabled=false;btn.textContent='更新密碼';
  if(error){setMsg('更新失敗，請重新點擊信件中的連結','err');return;}
  setMsg('密碼已成功更新！3 秒後跳轉…','ok');
  setTimeout(()=>window.location.href='login.html',3000);
}
function setMsg(msg,type){const e=document.getElementById('msg');e.textContent=msg;e.className='msg '+type+' show';}
</script>
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;padding:10px 20px;border-radius:100px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;"></div>
<script>function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(window._tt2);window._tt2=setTimeout(()=>t.style.opacity='0',2400);}</script>
</body>
</html>
