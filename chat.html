<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>訊息 — 技遇</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#3D9970"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--g:#3D9970;--gl:#E8F5EF;--t:#111;--t2:#888;--bd:#EBEBEB;--bg2:#F7F7F7;}
html,body{height:100%;background:#fff;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* LIST VIEW */
.list-header{padding:calc(env(safe-area-inset-top,0px)+16px) 20px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.list-title{font-family:'Instrument Serif',serif;font-size:26px;color:var(--t);}
.list-title i{font-style:italic;color:var(--g);}
.conv-list{flex:1;overflow-y:auto;}
.conv-list::-webkit-scrollbar{display:none;}
.ci{display:flex;gap:13px;align-items:center;padding:14px 20px;border-bottom:1px solid #F5F5F5;cursor:pointer;}
.ci:active{background:var(--bg2);}
.ci-ava{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--gl);}
.ci-name{font-weight:600;font-size:14px;color:var(--t);margin-bottom:3px;}
.ci-preview{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;}
.ci-time{font-size:11px;color:var(--t2);flex-shrink:0;}
.ci-dot{width:8px;height:8px;border-radius:50%;background:var(--g);margin-top:4px;margin-left:auto;}
.unread .ci-time{color:var(--g);font-weight:600;}
.empty{text-align:center;padding:64px 24px;color:var(--t2);}
.empty-em{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--t);margin-bottom:8px;}
.empty-sub{font-size:14px;line-height:1.6;}
.loading{text-align:center;padding:48px;color:var(--t2);font-size:14px;}

/* CHAT ROOM */
#chatroom{display:none;flex-direction:column;height:100%;}
.cr-header{padding:calc(env(safe-area-inset-top,0px)+10px) 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0;background:#fff;}
.cr-back{background:none;border:none;font-size:22px;color:var(--t2);cursor:pointer;padding:0;line-height:1;}
.cr-ava{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--gl);flex-shrink:0;}
.cr-name{font-weight:600;font-size:15px;color:var(--t);}
.cr-skill{font-size:11px;color:var(--t2);}
.bubbles{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px;}
.bubbles::-webkit-scrollbar{display:none;}
.bub{max-width:76%;padding:10px 13px;font-size:14px;line-height:1.55;word-break:break-word;}
.bub.them{background:#F2F2F2;border-radius:18px 18px 18px 4px;align-self:flex-start;color:var(--t);}
.bub.me{background:var(--g);color:#fff;border-radius:18px 18px 4px 18px;align-self:flex-end;}
.bub-time{font-size:10px;color:#BBB;margin-top:3px;}
.bub.me .bub-time{text-align:right;}
.day-sep{text-align:center;font-size:11px;color:#CCC;margin:8px 0;}
.typing{font-size:12px;color:var(--t2);padding:0 18px 8px;font-style:italic;}
.cr-input{padding:10px 14px calc(env(safe-area-inset-bottom,0px)+10px);border-top:1px solid var(--bd);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;background:#fff;}
.msg-box{flex:1;background:var(--bg2);border:none;border-radius:14px;padding:10px 14px;font-family:inherit;font-size:15px;outline:none;resize:none;max-height:120px;line-height:1.4;}
.send-btn{width:40px;height:40px;border-radius:13px;background:var(--g);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s;}
.send-btn:disabled{opacity:.4;}
.send-btn svg{display:block;}
</style>
</head>
<body>
<div id="app">

  <!-- 對話列表 -->
  <div id="listview" style="display:flex;flex-direction:column;height:100%;">
    <div class="list-header">
      <div class="list-title"><i>訊息</i></div>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="loading">⏳ 載入中…</div>
    </div>
  </div>

  <!-- 聊天室 -->
  <div id="chatroom">
    <div class="cr-header">
      <button class="cr-back" onclick="backToList()">‹</button>
      <div class="cr-ava" id="cr-ava">😊</div>
      <div>
        <div class="cr-name" id="cr-name">—</div>
        <div class="cr-skill" id="cr-skill">—</div>
      </div>
    </div>
    <div class="bubbles" id="bubbles"></div>
    <div class="typing" id="typing-indicator" style="display:none;">對方正在輸入…</div>
    <div class="cr-input">
      <textarea class="msg-box" id="msg-box" placeholder="輸入訊息…" rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://your-project.supabase.co';
const SUPABASE_KEY='your-anon-public-key';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null;
let currentSwapId=null;
let msgChannel=null;

// ── 初始化 ────────────────────────────────────
window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{user}}=await sb.auth.getUser();
  if(!user){window.location.href='login.html';return;}
  currentUser=user;

  // 從 URL 參數直接開啟特定對話
  const params=new URLSearchParams(location.search);
  const swapId=params.get('swap');
  if(swapId){
    await openChat(swapId);
  } else {
    await loadConversations();
  }
});

// ── 對話列表 ──────────────────────────────────
async function loadConversations(){
  const{data}=await sb.from('swaps')
    .select('*,skills(name,emoji),req:profiles!swaps_requester_id_fkey(full_name,avatar_url),prov:profiles!swaps_provider_id_fkey(full_name,avatar_url),messages(content,created_at)')
    .or(`requester_id.eq.${currentUser.id},provider_id.eq.${currentUser.id}`)
    .in('status',['accepted','completed'])
    .order('created_at',{ascending:false});

  const list=data||[];
  const cl=document.getElementById('conv-list');
  if(!list.length){
    cl.innerHTML=`<div class="empty">
      <div class="empty-em">💬</div>
      <div class="empty-title">還沒有訊息</div>
      <div class="empty-sub">配對成功後就可以開始聊天了！<br>去配對頁面接受申請吧。</div>
    </div>`;
    return;
  }
  cl.innerHTML=list.map(s=>{
    const isReq=s.requester_id===currentUser.id;
    const other=isReq?s.prov:s.req;
    const msgs=s.messages||[];
    const last=msgs[msgs.length-1];
    const preview=last?last.content:'開始聊天吧！';
    const timeStr=last?fmtTime(last.created_at):'';
    return `<div class="ci" onclick="openChat('${s.id}')">
      <div class="ci-ava">${other?.avatar_url||'😊'}</div>
      <div style="flex:1;min-width:0;">
        <div class="ci-name">${other?.full_name||'用戶'}</div>
        <div class="ci-preview">${s.skills?.emoji||''} ${s.skills?.name||''} · ${preview}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:10px;">
        <div class="ci-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 開啟聊天室 ────────────────────────────────
async function openChat(swapId){
  currentSwapId=swapId;

  // 取得 swap 資訊
  const{data:swap}=await sb.from('swaps')
    .select('*,skills(name,emoji),req:profiles!swaps_requester_id_fkey(full_name,avatar_url),prov:profiles!swaps_provider_id_fkey(full_name,avatar_url)')
    .eq('id',swapId).single();
  if(!swap)return;

  const isReq=swap.requester_id===currentUser.id;
  const other=isReq?swap.prov:swap.req;

  document.getElementById('cr-ava').textContent=other?.avatar_url||'😊';
  document.getElementById('cr-name').textContent=other?.full_name||'用戶';
  document.getElementById('cr-skill').textContent=(swap.skills?.emoji||'')+(swap.skills?.name||'技遇');

  // 切換畫面
  document.getElementById('listview').style.display='none';
  document.getElementById('chatroom').style.display='flex';
  document.getElementById('chatroom').style.flexDirection='column';

  // 載入歷史訊息
  await loadMessages();

  // 訂閱即時訊息
  if(msgChannel)msgChannel.unsubscribe();
  msgChannel=sb.channel('messages:'+swapId)
    .on('postgres_changes',{
      event:'INSERT',schema:'public',table:'messages',
      filter:`swap_id=eq.${swapId}`
    },payload=>appendMessage(payload.new))
    .subscribe();

  document.getElementById('msg-box').focus();
}

// ── 載入歷史訊息 ──────────────────────────────
async function loadMessages(){
  const{data}=await sb.from('messages')
    .select('*,profiles(full_name,avatar_url)')
    .eq('swap_id',currentSwapId)
    .order('created_at',{ascending:true});

  const bubbles=document.getElementById('bubbles');
  bubbles.innerHTML='';
  if(!data?.length){
    bubbles.innerHTML='<div style="text-align:center;padding:32px;font-size:14px;color:#AAA;">傳送第一則訊息，開始你的技遇！👋</div>';
    return;
  }
  let lastDate='';
  data.forEach(msg=>{
    const d=new Date(msg.created_at).toLocaleDateString('zh-TW');
    if(d!==lastDate){
      const sep=document.createElement('div');
      sep.className='day-sep';sep.textContent=d;
      bubbles.appendChild(sep);
      lastDate=d;
    }
    appendMessage(msg,false);
  });
  scrollBottom();
}

// ── 附加一則訊息 ──────────────────────────────
function appendMessage(msg,doScroll=true){
  const isMe=msg.sender_id===currentUser.id;
  const bubbles=document.getElementById('bubbles');
  // 移除空狀態
  const empty=bubbles.querySelector('[style*="text-align:center"]');
  if(empty)empty.remove();

  const wrap=document.createElement('div');
  wrap.style.display='flex';
  wrap.style.flexDirection='column';
  wrap.style.alignItems=isMe?'flex-end':'flex-start';

  const bub=document.createElement('div');
  bub.className='bub '+(isMe?'me':'them');
  bub.textContent=msg.content;
  wrap.appendChild(bub);

  const time=document.createElement('div');
  time.className='bub-time';
  time.textContent=fmtTime(msg.created_at);
  wrap.appendChild(time);

  bubbles.appendChild(wrap);
  if(doScroll)scrollBottom();
}

// ── 送出訊息 ──────────────────────────────────
async function sendMsg(){
  const box=document.getElementById('msg-box');
  const content=box.value.trim();
  if(!content||!currentSwapId)return;

  box.value='';
  box.style.height='';

  const{error}=await sb.from('messages').insert({
    swap_id:currentSwapId,
    sender_id:currentUser.id,
    content,
  });
  if(error)console.error('送訊息失敗:',error);
}

// ── 返回列表 ──────────────────────────────────
function backToList(){
  if(msgChannel){msgChannel.unsubscribe();msgChannel=null;}
  currentSwapId=null;
  document.getElementById('chatroom').style.display='none';
  document.getElementById('listview').style.display='flex';
  loadConversations();
}

// ── Helpers ───────────────────────────────────
function scrollBottom(){
  const b=document.getElementById('bubbles');
  b.scrollTop=b.scrollHeight;
}
function autoResize(el){
  el.style.height='';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}
function fmtTime(iso){
  const d=new Date(iso);
  const now=new Date();
  const diffDays=Math.floor((now-d)/86400000);
  if(diffDays===0)return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  if(diffDays===1)return '昨天';
  if(diffDays<7)return ['日','一','二','三','四','五','六'][d.getDay()]+'曜';
  return d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
}
</script>
</body>
</html>
