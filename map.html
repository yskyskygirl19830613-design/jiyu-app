<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>地圖 — 技遇</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#3D9970"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--g:#3D9970;--gl:#E8F5EF;--t:#111;--t2:#888;--bd:#EBEBEB;--bg2:#F7F7F7;}
html,body{height:100%;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#map{flex:1;z-index:0;}
/* top overlay */
.top{position:absolute;top:calc(env(safe-area-inset-top,0px)+10px);left:0;right:0;padding:0 14px;z-index:400;display:flex;flex-direction:column;gap:7px;}
.srch-pill{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.97);border-radius:14px;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.srch-pill input{border:none;background:transparent;font-family:inherit;font-size:14px;color:var(--t);outline:none;flex:1;}
.srch-pill input::placeholder{color:#AAA;}
.cat-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cat-row::-webkit-scrollbar{display:none;}
.cchip{border-radius:100px;padding:7px 14px;font-size:13px;font-weight:500;border:none;white-space:nowrap;cursor:pointer;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.cchip.off{background:rgba(255,255,255,.95);color:#555;}
.cchip.on{background:var(--g);color:#fff;}
/* count + locate */
.count-box{position:absolute;z-index:400;background:rgba(255,255,255,.97);border-radius:12px;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.count-n{font-family:'Instrument Serif',serif;font-size:18px;color:var(--t);}
.count-l{font-size:11px;color:var(--t2);}
.locate-btn{position:absolute;z-index:400;width:42px;height:42px;background:rgba(255,255,255,.97);border-radius:12px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);font-size:18px;}
/* nearby strip */
.strip{position:absolute;bottom:0;left:0;right:0;z-index:400;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);padding-bottom:calc(env(safe-area-inset-bottom,0px)+4px);}
.strip-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:12px auto 10px;}
.strip-hdr{padding:0 20px 10px;display:flex;align-items:center;justify-content:space-between;}
.strip-title{font-family:'Instrument Serif',serif;font-size:16px;color:var(--t);}
.strip-scroll{display:flex;gap:11px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none;}
.strip-scroll::-webkit-scrollbar{display:none;}
.nc{flex-shrink:0;width:152px;background:#fff;border:1px solid var(--bd);border-radius:15px;overflow:hidden;cursor:pointer;transition:all .12s;}
.nc.sel{border-color:var(--g);box-shadow:0 0 0 2px rgba(61,153,112,.2);}
.nc:active{transform:scale(.97);}
.nc-img{height:70px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.nc-body{padding:8px 10px 11px;}
.nc-name{font-family:'Instrument Serif',serif;font-size:13px;color:var(--t);margin-bottom:2px;}
.nc-dist{font-size:11px;color:var(--g);font-weight:500;margin-bottom:4px;}
.tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:100px;display:inline-block;}
.tg{background:#E8F5EF;color:#2D7A55;}.to{background:#FFF0E8;color:#B85A1E;}
.tc{background:#EAF0FF;color:#2D53C5;}.ty{background:#FFF6E0;color:#9A6A00;}
.tp{background:#FDE8F3;color:#A0306A;}
/* detail overlay */
.detail-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:flex-end;}
.detail-ov.show{display:flex;}
.det-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px);}
.dh{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:12px auto 14px;}
.dh-head{padding:0 20px 14px;display:flex;gap:13px;align-items:center;border-bottom:1px solid #F5F5F5;}
.dh-em{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.dh-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--t);}
.dh-sub{font-size:12px;color:var(--t2);margin-top:3px;}
.cx{margin-left:auto;width:28px;height:28px;border-radius:50%;background:#F5F5F5;border:none;cursor:pointer;font-size:13px;color:#888;flex-shrink:0;}
.drows{padding:14px 20px;}
.drow{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.dicon{width:32px;height:32px;border-radius:9px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;}
.dlbl{font-size:13px;color:var(--t2);}
.dval{font-size:13px;font-weight:500;color:var(--t);margin-left:auto;}
.dbtns{display:flex;gap:10px;padding:0 20px;}
.btn-nav{padding:13px 16px;border-radius:13px;border:1.5px solid var(--gl);background:var(--gl);font-size:14px;font-weight:600;color:var(--g);cursor:pointer;font-family:inherit;}
.btn-apply{flex:1;padding:13px;border-radius:13px;border:none;background:var(--g);font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
.btn-apply:disabled{opacity:.45;}
/* pin styles */
.skill-pin{background:#fff;border-radius:20px;padding:5px 10px 5px 6px;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.14);border:2px solid var(--g);white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:var(--t);}
.cluster-pin{background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;border:3px solid #fff;box-shadow:0 2px 12px rgba(61,153,112,.45);}
/* back btn */
.back-btn{position:absolute;top:calc(env(safe-area-inset-top,0px)+10px);left:14px;z-index:410;width:38px;height:38px;background:rgba(255,255,255,.97);border-radius:11px;border:none;font-size:20px;color:var(--t2);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <!-- 搜尋 + 篩選 -->
  <div class="top" id="top-overlay">
    <div class="srch-pill">
      <span style="font-size:14px;color:#AAA;">🔍</span>
      <input type="text" id="map-search" placeholder="搜尋附近的技能…" oninput="filterPins()"/>
    </div>
    <div class="cat-row">
      <div class="cchip on" onclick="mfchip(this,'全部')">全部</div>
      <div class="cchip off" onclick="mfchip(this,'設計')">設計</div>
      <div class="cchip off" onclick="mfchip(this,'語言')">語言</div>
      <div class="cchip off" onclick="mfchip(this,'音樂')">音樂</div>
      <div class="cchip off" onclick="mfchip(this,'程式')">程式</div>
      <div class="cchip off" onclick="mfchip(this,'料理')">料理</div>
    </div>
  </div>

  <!-- 數量 -->
  <div class="count-box" id="count-box" style="top:calc(env(safe-area-inset-top,0px)+105px);left:14px;">
    <div class="count-n" id="count-n">0</div>
    <div class="count-l">個技能</div>
  </div>

  <!-- 定位 -->
  <button class="locate-btn" id="locate-btn" style="top:calc(env(safe-area-inset-top,0px)+105px);right:14px;" onclick="locateMe()">📍</button>

  <!-- 附近技能卡片列 -->
  <div class="strip" id="strip">
    <div class="strip-handle"></div>
    <div class="strip-hdr">
      <span class="strip-title">附近的技能</span>
      <span style="font-size:12px;color:var(--t2);" id="strip-sub">—</span>
    </div>
    <div class="strip-scroll" id="strip-scroll">
      <div style="padding:8px 0;font-size:13px;color:#AAA;">⏳ 載入中…</div>
    </div>
  </div>

  <!-- 詳情 overlay -->
  <div class="detail-ov" id="det-ov" onclick="if(event.target===this)closeDet()">
    <div class="det-sheet">
      <div class="dh"></div>
      <div class="dh-head">
        <div class="dh-em" id="det-em" style="background:var(--gl);">🎨</div>
        <div style="flex:1;"><div class="dh-title" id="det-title">—</div><div class="dh-sub" id="det-sub">—</div></div>
        <button class="cx" onclick="closeDet()">✕</button>
      </div>
      <div class="drows">
        <div class="drow"><div class="dicon">🔄</div><div class="dlbl">想換技能</div><div class="dval" id="det-want">—</div></div>
        <div class="drow"><div class="dicon">🕐</div><div class="dlbl">上課方式</div><div class="dval" id="det-mode">—</div></div>
        <div class="drow"><div class="dicon">📍</div><div class="dlbl">距離你</div><div class="dval" id="det-dist">—</div></div>
      </div>
      <div class="dbtns">
        <button class="btn-nav" id="det-nav" onclick="openNav()" style="display:none;">🗺 導航</button>
        <button class="btn-apply" id="det-apply" onclick="applySwap()">申請交換</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://your-project.supabase.co';
const SUPABASE_KEY='your-anon-public-key';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null, userLatLng=null;
let allSkills=[], activeCategory='全部';
let leafMap=null, markerGroup=null, currentSkill=null;
const catColors={設計:'#F0FAF5',語言:'#FFFBF0',音樂:'#FFF0F5',程式:'#EFF2FF',料理:'#FFF5F0',攝影:'#FDE8F3',健身:'#F0FAF5',其他:'#F5F5F5'};
const catTags  ={設計:'tg',語言:'ty',音樂:'tp',程式:'tc',料理:'to',攝影:'tp',健身:'tg',其他:'tg'};

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{user}}=await sb.auth.getUser();
  if(!user){window.location.href='login.html';return;}
  currentUser=user;
  initMap();
  await loadSkills();
  locateMe(false);
});

function initMap(){
  leafMap=L.map('map',{zoomControl:false,attributionControl:false})
    .setView([23.7,121.0],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafMap);

  // 使用 MarkerCluster 做聚合
  markerGroup=L.markerClusterGroup({
    iconCreateFunction:cluster=>{
      const n=cluster.getChildCount();
      const size=n>50?60:n>20?54:46;
      return L.divIcon({
        html:`<div class="cluster-pin" style="width:${size}px;height:${size}px;font-size:${n>9?15:17}px;">${n>99?'99+':n}</div>`,
        className:'',iconAnchor:[size/2,size/2]
      });
    },
    maxClusterRadius:60,
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
  });
  leafMap.addLayer(markerGroup);
}

async function loadSkills(){
  const{data}=await sb.from('skills')
    .select('*,profiles(full_name,avatar_url)')
    .eq('is_active',true)
    .not('lat','is',null);
  allSkills=data||[];
  renderPins();
  renderStrip();
}

function renderPins(){
  markerGroup.clearLayers();
  const search=document.getElementById('map-search').value.toLowerCase();
  const list=allSkills.filter(s=>{
    const cm=activeCategory==='全部'||s.category===activeCategory;
    const sm=!search||s.name.toLowerCase().includes(search);
    return cm&&sm;
  });
  document.getElementById('count-n').textContent=list.length;

  list.forEach(s=>{
    if(!s.lat||!s.lng)return;
    const icon=L.divIcon({
      html:`<div class="skill-pin"><span style="font-size:15px;">${s.emoji||'🎨'}</span>${s.name.slice(0,6)}</div>`,
      className:'',iconAnchor:[0,34]
    });
    L.marker([s.lat,s.lng],{icon}).addTo(markerGroup)
      .on('click',()=>openDet(s));
  });
}

function renderStrip(){
  const list=allSkills.filter(s=>activeCategory==='全部'||s.category===activeCategory);
  const sorted=userLatLng
    ? list.filter(s=>s.lat).sort((a,b)=>dist(a)-dist(b))
    : list.slice(0,10);
  document.getElementById('strip-sub').textContent=sorted.length+' 個';
  document.getElementById('strip-scroll').innerHTML=sorted.slice(0,8).map(s=>`
    <div class="nc" onclick="openDetById('${s.id}')">
      <div class="nc-img" style="background:${catColors[s.category]||'#F5F5F5'};">${s.emoji||'🎨'}</div>
      <div class="nc-body">
        <div class="nc-name">${s.name}</div>
        <div class="nc-dist">📍 ${s.lat&&userLatLng?fmtDist(dist(s)):(s.city||'—')}</div>
        <div class="tag ${catTags[s.category]||'tg'}">換：${s.want||'—'}</div>
      </div>
    </div>`).join('');
}

function dist(s){
  if(!userLatLng||!s.lat)return Infinity;
  const R=6371000,lat1=userLatLng.lat*Math.PI/180,lat2=s.lat*Math.PI/180;
  const dlat=(s.lat-userLatLng.lat)*Math.PI/180,dlng=(s.lng-userLatLng.lng)*Math.PI/180;
  const a=Math.sin(dlat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){return m<1000?Math.round(m)+'公尺':(m/1000).toFixed(1)+'公里';}

function openDetById(id){
  const s=allSkills.find(x=>x.id===id);
  if(s)openDet(s);
}
function openDet(s){
  if(typeof s==='string')s=JSON.parse(s);
  currentSkill=s;
  document.getElementById('det-em').textContent=s.emoji||'🎨';
  document.getElementById('det-em').style.background=catColors[s.category]||'#F5F5F5';
  document.getElementById('det-title').textContent=s.name;
  document.getElementById('det-sub').textContent=(s.profiles?.full_name||'用戶')+' · '+(s.city||'');
  document.getElementById('det-want').textContent=s.want||'—';
  document.getElementById('det-mode').textContent=s.mode||'—';
  document.getElementById('det-dist').textContent=s.lat&&userLatLng?fmtDist(dist(s)):(s.city||'—');
  const own=s.user_id===currentUser.id;
  document.getElementById('det-apply').textContent=own?'這是你的技能':'申請交換';
  document.getElementById('det-apply').disabled=own;
  document.getElementById('det-nav').style.display=(s.mode==='面對面'||s.mode==='都可以')?'block':'none';
  document.getElementById('det-ov').classList.add('show');
  if(s.lat)leafMap.panTo([s.lat,s.lng],{animate:true});
}
function closeDet(){document.getElementById('det-ov').classList.remove('show');}

function openNav(){
  if(currentSkill?.lat)window.open(`https://maps.apple.com/?daddr=${currentSkill.lat},${currentSkill.lng}&dirflg=d`,'_blank');
}

async function applySwap(){
  if(!currentSkill||currentSkill.user_id===currentUser.id)return;
  const btn=document.getElementById('det-apply');
  btn.disabled=true;btn.textContent='送出中…';
  const{error}=await sb.from('swaps').insert({
    requester_id:currentUser.id,provider_id:currentSkill.user_id,
    skill_id:currentSkill.id,status:'pending',
  });
  btn.disabled=false;btn.textContent='申請交換';
  if(error&&error.code!=='23505'){alert('申請失敗，請再試');return;}
  closeDet();
  alert('申請已送出！等對方回覆 🎉');
}

function locateMe(pan=true){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLatLng={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(pan)leafMap.setView([userLatLng.lat,userLatLng.lng],13);
    L.circleMarker([userLatLng.lat,userLatLng.lng],{radius:8,color:'#3D9970',fillColor:'#3D9970',fillOpacity:1,weight:3,opacity:.4}).addTo(leafMap);
    renderStrip();
  });
}

function mfchip(el,cat){
  document.querySelectorAll('.cchip').forEach(c=>{c.classList.remove('on');c.classList.add('off');});
  el.classList.remove('off');el.classList.add('on');
  activeCategory=cat;
  renderPins();renderStrip();
}
function filterPins(){renderPins();}
</script>
</body>
</html>
